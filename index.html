<!-- Style Hii inaleta muonekano wa App ya kisasa -->
<style>
    :root { --bg: #0f172a; --card: #1e293b; --accent: #f43f5e; }
    body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
    
    .navbar { padding: 20px; display: flex; justify-content: space-between; background: #020617; }
    
    .downloader-box { 
        max-width: 800px; margin: 50px auto; padding: 40px; 
        background: var(--card); border-radius: 20px; text-align: center;
        box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
    }
    
    .input-group { display: flex; gap: 10px; margin-top: 20px; }
    input { flex: 1; padding: 15px; border-radius: 10px; border: none; background: #334155; color: white; }
    button { padding: 15px 30px; background: var(--accent); border: none; border-radius: 10px; color: white; cursor: pointer; }
    
    .results-area { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
    .download-item { background: #334155; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; }
</style>

<div class="navbar"> <h2>EasySaver PRO</h2> </div>

<div class="downloader-box">
    <h1>Media Downloader</h1>
    <p>Paste link yako hapa chini kuanza kupakua:</p>
    <div class="input-group">
        <input type="text" id="url" placeholder="Mfano: https://youtube.com/...">
        <button onclick="fetchVideo()">Changanua</button>
    </div>
    <div id="results" class="results-area"></div>
</div>
