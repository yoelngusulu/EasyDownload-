<style>
    /* Muonekano wa Vidmate-style */
    .hero { background: #1e293b; color: white; padding: 60px 20px; }
    .search-container { max-width: 700px; margin: 0 auto; display: flex; gap: 10px; }
    .search-container input { flex: 1; padding: 15px; border-radius: 30px; border: none; }
    .search-container button { padding: 10px 30px; border-radius: 30px; background: #e11d48; color: white; border: none; font-weight: bold; }
    
    .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
    .card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .card img { width: 100%; border-radius: 8px; }
</style>

<section class="hero">
    <h1>Pakua Video na Muziki kwa Urahisi</h1>
    <div class="search-container">
        <input type="text" placeholder="Paste link ya video hapa (YouTube, Facebook, Instagram...)" id="urlInput">
        <button onclick="processDownload()">Download</button>
    </div>
</section>

<section class="content-grid" id="trending">
    <!-- Hapa ndipo video zinazovuma zitakaa -->
    <div class="card">
        <img src="video-placeholder.jpg" alt="Video">
        <p>Video ya Kusisimua</p>
    </div>
    <!-- ...card zaidi -->
</section>
