<!DOCTYPE html>
<link rel="alternate" hreflang="en" href="/en/index.html" />
  <link rel="alternate" hreflang="fr" href="/fr/index.html" />
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Easy Saver</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header><div class="logo">Easy Saver</div></header>
    <div class="hero">
        <h1>Easy Saver Downloader</h1>
        <div class="search-box">
            <input type="text" id="videoUrl" placeholder="Bandika link hapa...">
            <button onclick="processVideo()">Tafuta →</button>
        </div>
        <div id="statusMessage" class="status"></div>
    </div>

    <div id="videoInfo" class="video-info" style="display:none;">
        <h3 id="videoTitle">Video Title</h3>
        <div class="format-selection show">
            <label><input type="radio" name="format" value="mp4" checked> MP4 (Video)</label>
            <label><input type="radio" name="format" value="mp3"> MP3 (Audio)</label>
        </div>
        <button id="downloadBtn" class="download-btn" onclick="startDownload()">Download Sasa ⬇️</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
